listen = "0.0.0.0:8080"
audit_log = "/tmp/stalin-audit.jsonl"

# Enable this to inspect HTTPS requests after CONNECT. The CA certificate must
# be trusted by the monitored client/container.
#
# [mitm]
# enabled = true
# ca_cert = "certs/stalin-ca.pem"
# ca_key = "certs/stalin-ca-key.pem"

[secrets.openai_api_key]
env = "OPENAI_API_KEY"

# Enable this to run the V8 request-header example plugin.
#
# [[plugins]]
# name = "openai-auth"
# version = "0.1.0"
# path = "openai-auth.plugin.ts"

[[rules]]
name = "block-instance-metadata"
audit = true

[rules.match]
host = "169.254.169.254"

[rules.deny]
status = 403
body = "metadata service access is blocked\n"

[[rules]]
name = "openai-auth"
audit = true

[rules.match]
host = "api.openai.com"

[rules.request_headers.set]
authorization = { secret = "openai_api_key", format = "Bearer {value}" }

[rules.request_headers]
remove = ["x-placeholder-authorization"]
